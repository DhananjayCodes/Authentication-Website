{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div style="max-width:640px;margin:0 auto">
  <h2 style="text-align:center;margin-bottom:12px">Create an account</h2>
  {% if error %}<div class="message error">{{ error }}</div>{% endif %}
  <form method="post" action="{{ url_for('register') }}" enctype="multipart/form-data">
    <div style="display:flex;gap:12px;align-items:center;margin-bottom:10px">
      <div class="avatar-circle" id="avatarCircle">
        <img id="avatarPreview" src="{{ url_for('static', filename='uploads/default-avatar.png') }}" style="width:100%;height:100%;object-fit:cover">
        <div class="camera-btn">☁️</div>
      </div>
      <div style="flex:1">
        <input class="input" name="username" placeholder="Username" required value="{{ form.username if form else '' }}">
        <input class="input" name="password" placeholder="Password" type="password" required>
      </div>
    </div>

    <input class="input" name="name" placeholder="Full name" value="{{ form.name if form else '' }}">
    <div class="form-row">
      <div class="row-half"><input class="input" name="age" placeholder="Age" type="number" value="{{ form.age if form else '' }}"></div>
      <div class="row-half"><input class="input" name="phone" placeholder="Phone" value="{{ form.phone if form else '' }}"></div>
    </div>

    <input type="file" id="profileInput" name="profile_picture" accept="image/*" style="display:none">

    <div style="display:flex;gap:8px;margin-top:12px">
      <input class="btn" type="submit" value="Register">
      <a href="{{ url_for('login') }}"><button type="button" class="btn alt">Back to Login</button></a>
    </div>
  </form>
</div>

<script>
  const avatarCircle = document.getElementById("avatarCircle");
  const profileInput = document.getElementById("profileInput");
  const avatarPreview = document.getElementById("avatarPreview");
  avatarCircle.addEventListener("click", ()=> profileInput.click());
  profileInput.addEventListener("change", ()=>{
    const f = profileInput.files[0];
    if(!f) return;
    avatarPreview.src = URL.createObjectURL(f);
  });
</script>
{% endblock %}
